name: Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  stats:
    name: Update Subdomain Stats
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Count subdomains
        id: count
        run: |
          COUNT=$(find subdomains -name "*.json" | wc -l | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Write stats.json
        run: |
          cat > stats.json <<EOF
          {
            "schemaVersion": 1,
            "label": "registered subdomains",
            "message": "${{ steps.count.outputs.count }}",
            "color": "blue"
          }
          EOF

      - name: Commit and push
        run: |
          git config user.name "Dyep"
          git config user.email "dyep@is-pinoy.dev"
          git add stats.json
          git diff --staged --quiet || git commit -m "chore: update subdomain stats"
          git push https://x:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
