name: Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  stats:
    name: Update Subdomain Stats
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Count subdomains
        id: count
        run: |
          COUNT=$(find subdomains -name "*.json" | wc -l | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Write stats.json
        run: |
          cat > stats.json <<EOF
          {
            "schemaVersion": 1,
            "label": "registered subdomains",
            "message": "${{ steps.count.outputs.count }}",
            "color": "blue"
          }
          EOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "chore: update subdomain stats"
          author: "Dyep <dyep@is-pinoy.dev>"
          committer: "Dyep <dyep@is-pinoy.dev>"
          title: "chore: update subdomain stats"
          branch: "update-stats"
          base: "main"
          delete-branch: true
          labels: "automated"
