name: Validate

on:
  pull_request:
    paths:
      - "subdomains/**"

jobs:
  validate:
    name: Validate Subdomains
    runs-on: ubuntu-latest
    steps:
      - name: Checkout domains
        uses: actions/checkout@v4

      - name: Checkout ecosystem
        uses: actions/checkout@v4
        with:
          repository: is-pinoy-dev/ecosystem
          path: ecosystem

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ecosystem/pnpm-lock.yaml

      - name: Cache CLI build
        id: cache-cli
        uses: actions/cache@v4
        with:
          path: ecosystem/packages/cli/dist
          key: cli-${{ hashFiles('ecosystem/packages/cli/src/**', 'ecosystem/pnpm-lock.yaml') }}

      - name: Install dependencies
        working-directory: ecosystem
        run: pnpm install --frozen-lockfile

      - name: Build schemas and registry
        working-directory: ecosystem
        run: pnpm --filter @is-pinoy-dev/schemas build && pnpm --filter @is-pinoy-dev/registry build

      - name: Build CLI
        if: steps.cache-cli.outputs.cache-hit != 'true'
        working-directory: ecosystem
        run: pnpm --filter @is-pinoy-dev/cli build

      - name: Validate subdomain ownership
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          GH_TOKEN: ${{ github.token }}
        run: |
          files=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
            --jq '.[].filename | select(startswith("subdomains/") and endswith(".json"))')
          failed=false
          for file in $files; do
            owner=$(jq -r '.owner.github' "$file")
            if [ "$owner" != "$PR_AUTHOR" ]; then
              echo "Error: $file — owner.github \"$owner\" does not match PR author \"$PR_AUTHOR\""
              failed=true
            fi
          done
          [ "$failed" = "true" ] && exit 1 || exit 0

      - name: Validate subdomains
        run: node ecosystem/packages/cli/dist/index.js registry validate --dir ./subdomains
